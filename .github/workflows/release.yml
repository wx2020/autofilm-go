name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary:
    name: Build Binary (linux_amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X github.com/akimio/autofilm/internal/core.Version=${{ steps.version.outputs.VERSION }}" \
            -o autofilm-linux-amd64 \
            ./cmd/autofilm

      - name: Create archive
        run: |
          tar -czf autofilm-linux-amd64.tar.gz autofilm-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autofilm-linux-amd64
          path: autofilm-linux-amd64.tar.gz
          retention-days: 7

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binary, build-docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: autofilm-linux-amd64
          path: .

      - name: Generate release notes
        id: release_notes
        run: |
          # 获取上一个标签
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 生成提交记录
          if [ -n "$PREV_TAG" ]; then
            cat > changelog.md << EOF
          ## 📝 本次更新内容

          ### 自 ${PREV_TAG} 以来的提交记录：

          EOF
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> changelog.md
          else
            cat > changelog.md << 'EOF'
          ## 📝 本次更新内容

          ### 首次发布！
          EOF
          fi

          # 生成完整的 release notes
          cat > release_notes.md << 'MARKDOWN'
          ## 🚀 AutoFilm ${{ steps.version.outputs.VERSION }}

          ### 📦 Docker Image

          ```bash
          # 拉取特定版本
          docker pull ghcr.io/wx2020/autofilm-go:${{ steps.version.outputs.VERSION }}

          # 拉取最新版本
          docker pull ghcr.io/wx2020/autofilm-go:latest
          ```

          ### 💾 二进制文件

          下载下方附件中的 `${{ steps.version.outputs.VERSION }}` 版本二进制文件。

          ### 使用方法

          #### Docker 方式（推荐）

          ```bash
          docker run -d \
            -v /path/to/config:/config \
            -v /path/to/logs:/logs \
            -v /path/to/fonts:/fonts \
            -v /path/to/media:/media \
            ghcr.io/wx2020/autofilm-go:${{ steps.version.outputs.VERSION }}
          ```

          #### 二进制文件方式

          ```bash
          # 解压
          tar -xzf autofilm-linux-amd64.tar.gz

          # 赋予执行权限
          chmod +x autofilm-linux-amd64

          # 运行
          ./autofilm-linux-amd64
          ```
          MARKDOWN

          # 合并 changelog 和 release notes
          cat changelog.md >> release_notes.md

          # 使用 EOF 文件语法设置输出
          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: AutoFilm ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: autofilm-linux-amd64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
