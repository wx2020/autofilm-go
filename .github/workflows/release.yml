name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary:
    name: Build Binary (linux_amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X github.com/akimio/autofilm/internal/core.Version=${{ steps.version.outputs.VERSION }}" \
            -o autofilm-linux-amd64 \
            ./cmd/autofilm

      - name: Create archive
        run: |
          tar -czf autofilm-linux-amd64.tar.gz autofilm-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autofilm-linux-amd64
          path: autofilm-linux-amd64.tar.gz
          retention-days: 7

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binary, build-docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: autofilm-linux-amd64
          path: .

      - name: Generate release notes
        id: release_notes
        run: |
          NOTES="## 🚀 AutoFilm ${{ steps.version.outputs.VERSION }}\n\n"
          NOTES+="### 📦 Docker Image\n\n"
          NOTES+="\`\`\`bash\n"
          NOTES+="# 拉取特定版本\n"
          NOTES+="docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}\n\n"
          NOTES+="# 拉取最新版本\n"
          NOTES+="docker pull ghcr.io/${{ github.repository }}:latest\n"
          NOTES+="\`\`\`\n\n"
          NOTES+="### 💾 二进制文件\n\n"
          NOTES+="下载下方附件中的 \`${{ steps.version.outputs.VERSION }}\` 版本二进制文件。\n\n"
          NOTES+="### 使用方法\n\n"
          NOTES+="\`\`\`bash\n"
          NOTES="# 解压\n"
          NOTES+="tar -xzf autofilm-linux-amd64.tar.gz\n\n"
          NOTES+="# 赋予执行权限\n"
          NOTES+="chmod +x autofilm-linux-amd64\n\n"
          NOTES+="# 运行\n"
          NOTES+="./autofilm-linux-amd64\n"
          NOTES+="\`\`\`\n"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: AutoFilm ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: autofilm-linux-amd64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
